# Fresh reproducible environment for the RB3135 reconstruction framework.
#   conda env create -f environment.yml
#   conda activate rb3135
#
# pythonocc-core is only available from conda-forge (not PyPI), which is why
# conda — not pip — is the canonical installation path for this project.
name: rb3135
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pythonocc-core>=7.8.0
  - numpy>=1.26
  - scipy>=1.11
  - pip
  - pip:
      - pytest>=8.0
      - mypy>=1.8
      - ruff>=0.5
      - black>=24.0
